// ── AI Recommend ──
function AIRecommend({ goTo }) {
  const [mode, setMode] = useState(null);
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [showResult, setShowResult] = useState(false);
  const [analyzing, setAnalyzing] = useState(false);
  const q = AI_QUESTIONS[step];

  const handleSingle = (key, val) => {
    setAnswers({...answers,[key]:val});
    setTimeout(() => { if(step<AI_QUESTIONS.length-1) setStep(step+1); else { setAnalyzing(true); setTimeout(()=>{setAnalyzing(false);setShowResult(true);},2500); } },350);
  };
  const handleMulti = (key, val, max) => {
    const cur = answers[key]||[];
    if(cur.includes(val)) setAnswers({...answers,[key]:cur.filter(v=>v!==val)});
    else if(!max||cur.length<max) setAnswers({...answers,[key]:[...cur,val]});
  };
  const handleDual = (subKey, val) => { setAnswers({...answers,[q.key]:{...(answers[q.key]||{}),[subKey]:val}}); };
  const canProceed = () => {
    if(!q) return false;
    if(q.type==="dual_select") return q.selects.every(s=>(answers[q.key]||{})[s.key]);
    if(q.type==="multi") return (answers[q.key]||[]).length>0;
    return !!answers[q.key];
  };
  const goNext = () => { if(step<AI_QUESTIONS.length-1) setStep(step+1); else { setAnalyzing(true); setTimeout(()=>{setAnalyzing(false);setShowResult(true);},2500); } };

  const resultCanes = [ALL_CANES[0], ALL_CANES[1], ALL_CANES[11]];
  const reasons = [
    "歩行安定性の評価から多点杖を推奨。ダイヤル式高さ調整により、リハビリ進行に応じた細やかな調整が可能です。",
    "歩行自立度が比較的高く、軽量な一点杖での歩行が適応と判断。制振グリップが長時間歩行時の手首負担を軽減します。",
    "使用環境に屋外が含まれるため、大型ベースでの高安定性モデルも候補に。段差の多い環境に対応可能です。",
  ];

  return (
    <div style={{ background:C.bg,minHeight:"100vh" }}>
      <div style={{ background:`linear-gradient(165deg, ${C.dark} 0%, #0f3460 100%)`,padding:"42px 24px 34px",textAlign:"center",color:"#fff" }}>
        <h1 style={{ fontFamily:"'Noto Serif JP', serif",fontSize:24,fontWeight:700,margin:"0 0 8px" }}>AI杖リコメンド</h1>
        <p style={{ fontSize:13,color:"rgba(255,255,255,0.5)" }}>理学療法士監修のAIがあなたに最適な3本を選びます</p>
      </div>
      <div style={{ maxWidth:620,margin:"0 auto",padding:"32px 24px 80px" }}>
        {!mode && (
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:18 }}>
            {[
              {key:"ai",icon:"🧠",title:"AIに選んでもらう",desc:"8つの専門的な質問に回答\n歩行特性をAIが分析し\n最適な3本を提案",badge:"理学療法士監修",bc:C.primary,bb:C.primaryBg},
              {key:"self",icon:"🔍",title:"自分で3本選ぶ",desc:"全18本の商品一覧から\n気になる3本を自分で選択\nお試しセットとしてお届け",badge:"じっくり比較",bc:C.accent,bb:"#FFF8EB"},
            ].map(item=>(
              <div key={item.key} onClick={()=>item.key==="ai"?setMode("ai"):goTo(1)} style={{ background:C.white,borderRadius:16,padding:"34px 22px",textAlign:"center",cursor:"pointer",boxShadow:"0 1px 14px rgba(0,0,0,0.05)",border:"2px solid transparent",transition:"all 0.2s" }}
                onMouseEnter={e=>e.currentTarget.style.borderColor=C.primaryLight}
                onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                <div style={{ fontSize:40,marginBottom:12 }}>{item.icon}</div>
                <h3 style={{ fontSize:16,fontWeight:700,marginBottom:8,color:C.dark }}>{item.title}</h3>
                <p style={{ fontSize:12,color:C.textMuted,lineHeight:1.7,whiteSpace:"pre-line" }}>{item.desc}</p>
                <div style={{ marginTop:12 }}><Badge color={item.bc} bg={item.bb}>{item.badge}</Badge></div>
              </div>
            ))}
          </div>
        )}

        {mode==="ai" && !showResult && !analyzing && (
          <div style={{ background:C.white,borderRadius:16,padding:"36px 28px",boxShadow:"0 2px 18px rgba(0,0,0,0.05)" }}>
            <div style={{ display:"flex",gap:3,marginBottom:18 }}>
              {AI_QUESTIONS.map((_,i) => <div key={i} style={{ flex:1,height:3,borderRadius:2,background:i<=step?C.primary:"#e4e4e4",transition:"background 0.3s" }} />)}
            </div>
            <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4 }}>

              <span style={{ fontSize:11,color:C.textMuted }}>{step+1} / {AI_QUESTIONS.length}</span>
            </div>
            <h3 style={{ fontSize:18,fontWeight:700,color:C.dark,margin:"8px 0 4px",lineHeight:1.5 }}>{q.q}</h3>
            <p style={{ fontSize:11,color:C.textMuted,margin:"0 0 22px" }}>{q.note}</p>

            {q.type==="single" && (
              <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                {q.options.map(opt => (
                  <button key={opt} onClick={()=>handleSingle(q.key,opt)} style={{ background:answers[q.key]===opt?C.primary:C.bg,color:answers[q.key]===opt?"#fff":C.text,border:answers[q.key]===opt?`2px solid ${C.primary}`:`2px solid ${C.border}`,padding:"13px 16px",borderRadius:8,fontSize:13,cursor:"pointer",textAlign:"left",transition:"all 0.2s" }}>{opt}</button>
                ))}
              </div>
            )}
            {q.type==="multi" && (
              <div>
                <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                  {q.options.map(opt => {
                    const sel=(answers[q.key]||[]).includes(opt);
                    const atMax=q.maxSelect&&(answers[q.key]||[]).length>=q.maxSelect&&!sel;
                    return <button key={opt} onClick={()=>handleMulti(q.key,opt,q.maxSelect)} style={{ background:sel?C.primary:C.bg,color:sel?"#fff":atMax?C.textMuted:C.text,border:sel?`2px solid ${C.primary}`:`2px solid ${C.border}`,padding:"13px 16px",borderRadius:8,fontSize:13,cursor:atMax?"not-allowed":"pointer",textAlign:"left",opacity:atMax?0.5:1 }}><span style={{marginRight:6}}>{sel?"☑":"☐"}</span>{opt}</button>;
                  })}
                </div>
                {q.maxSelect && <p style={{ fontSize:11,color:C.textMuted,marginTop:6 }}>※ 最大{q.maxSelect}つまで</p>}
                <button onClick={goNext} disabled={!canProceed()} style={{ marginTop:18,background:canProceed()?C.primary:"#ccc",color:"#fff",border:"none",padding:"13px 28px",borderRadius:8,fontSize:14,fontWeight:700,cursor:canProceed()?"pointer":"not-allowed",width:"100%" }}>次へ</button>
              </div>
            )}
            {q.type==="dual_select" && (
              <div>
                {q.selects.map(sel => (
                  <div key={sel.key} style={{ marginBottom:18 }}>
                    <div style={{ fontSize:13,fontWeight:700,color:C.dark,marginBottom:6 }}>{sel.label}</div>
                    <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                      {sel.options.map(opt => {

                ))}
                <button onClick={goNext} disabled={!canProceed()} style={{ marginTop:6,background:canProceed()?C.primary:"#ccc",color:"#fff",border:"none",padding:"13px 28px",borderRadius:8,fontSize:14,fontWeight:700,cursor:canProceed()?"pointer":"not-allowed",width:"100%" }}>次へ</button>
              </div>
            )}
            <button onClick={()=>{if(step>0)setStep(step-1);else setMode(null);}} style={{ marginTop:14,background:"none",border:"none",color:C.textMuted,fontSize:12,cursor:"pointer" }}>← 戻る</button>
          </div>
        )}

        {analyzing && (

            <div style={{ width:56,height:56,borderRadius:"50%",border:`3px solid ${C.border}`,borderTopColor:C.primary,margin:"0 auto 20px",animation:"spin 1s linear infinite" }} />

          </div>
        )}

        {showResult && (
          <div>
            <div style={{ background:C.white,borderRadius:16,padding:"32px 26px",boxShadow:"0 2px 18px rgba(0,0,0,0.05)",textAlign:"center",marginBottom:18 }}>

                  <div style={{ display:"flex",gap:14,alignItems:"flex-start" }}>
                    <div style={{ width:38,height:38,borderRadius:10,background:C.primaryBg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:C.primary,fontSize:17,flexShrink:0 }}>{i+1}</div>

                      <div style={{ fontSize:17,fontWeight:800,color:C.primary }}>¥{cane.price.toLocaleString()}</div>
                      <div style={{ fontSize:10,color:C.textMuted }}>税込</div>
