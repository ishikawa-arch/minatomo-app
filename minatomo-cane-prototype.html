function ProductList({goTo}){

  const [showModal,setShowModal]=useState(false);
  const filtered = filter==="all"?ALL_CANES:ALL_CANES.filter(c=>c.type===filter);
  const toggle = id => { if(selected.includes(id)) setSelected(selected.filter(s=>s!==id)); else if(selected.length<3) setSelected([...selected,id]); };

  return (
    <div style={{paddingBottom:selected.length>0?130:70}}>
      {/* Header */}
      <div style={{background:C.dark,padding:"28px 20px 22px",color:"#fff"}}>
        <h1 style={{fontFamily:"'Noto Serif JP',serif",fontSize:22,fontWeight:700,marginBottom:6}}>杖の商品一覧</h1>
        <p style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>全18商品から選べます</p>
      </div>

      {/* Filter */}
      <div style={{padding:"16px 20px 0",display:"flex",gap:6,overflowX:"auto"}}>
        {[{key:"all",label:"すべて(18)"},{key:"single",label:"1点杖(9)"},{key:"multi",label:"多点杖(9)"}].map(t=>(
          <button key={t.key} onClick={()=>setFilter(t.key)} style={{
            padding:"8px 16px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",
            border:filter===t.key?"none":"1.5px solid #ccc",
            background:filter===t.key?C.primary:C.white,color:filter===t.key?"#fff":C.textLight,
          }}>{t.label}</button>
        ))}
      </div>

      {/* Cards */}
      <div style={{padding:"16px 20px"}}>
        {filtered.map(cane=>{
          const isSel=selected.includes(cane.id);
          return (
            <div key={cane.id} style={{
              background:C.white,borderRadius:14,marginBottom:14,overflow:"hidden",
              boxShadow:isSel?`0 0 0 2px ${C.primary},0 2px 12px rgba(42,107,90,0.12)`:"0 1px 8px rgba(0,0,0,0.05)",

                <div style={{position:"absolute",top:10,left:10,display:"flex",gap:4}}>

// ══ AI Recommend ══
function AIRecommend({goTo}){
  const [mode,setMode]=useState(null);
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState({});
  const [showResult,setShowResult]=useState(false);
  const [analyzing,setAnalyzing]=useState(false);
  const q=AI_QUESTIONS[step];

  const handleSingle=(key,val)=>{setAnswers({...answers,[key]:val});setTimeout(()=>{if(step<AI_QUESTIONS.length-1)setStep(step+1);else{setAnalyzing(true);setTimeout(()=>{setAnalyzing(false);setShowResult(true);},2500);}},350);};
  const handleMulti=(key,val,max)=>{const cur=answers[key]||[];if(cur.includes(val))setAnswers({...answers,[key]:cur.filter(v=>v!==val)});else if(!max||cur.length<max)setAnswers({...answers,[key]:[...cur,val]});};
  const handleDual=(subKey,val)=>{setAnswers({...answers,[q.key]:{...(answers[q.key]||{}),[subKey]:val}});};
  const canProceed=()=>{if(!q)return false;if(q.type==="dual_select")return q.selects.every(s=>(answers[q.key]||{})[s.key]);if(q.type==="multi")return(answers[q.key]||[]).length>0;return!!answers[q.key];};
  const goNext=()=>{if(step<AI_QUESTIONS.length-1)setStep(step+1);else{setAnalyzing(true);setTimeout(()=>{setAnalyzing(false);setShowResult(true);},2500);}};

  const resultCanes=[ALL_CANES[0],ALL_CANES[1],ALL_CANES[11]];
  const reasons=["歩行安定性の評価から多点杖を推奨。ダイヤル式で高さの微調整が可能。","軽量な一点杖が適応。制振グリップが手首負担を軽減。","屋外使用のため大型ベースの高安定性モデルも候補に。"];

  return (
    <div style={{paddingBottom:70}}>
      <div style={{background:`linear-gradient(170deg,${C.dark},#0f3460)`,padding:"28px 20px 22px",color:"#fff"}}>
        <h1 style={{fontFamily:"'Noto Serif JP',serif",fontSize:22,fontWeight:700,marginBottom:6}}>AI杖リコメンド</h1>
        <p style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>理学療法士監修AIが最適な3本を選びます</p>
      </div>

      <div style={{padding:"24px 20px"}}>
        {!mode && (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {[
              {key:"ai",icon:"🧠",title:"AIに選んでもらう",desc:"8つの専門的な質問に回答。歩行特性をAIが分析し最適な3本を提案",badge:"理学療法士監修",bc:C.primary,bb:C.primaryBg},
              {key:"self",icon:"🔍",title:"自分で3本選ぶ",desc:"全18本の商品一覧から気になる3本を自分で選んでお試し",badge:"じっくり比較",bc:C.accent,bb:"#FFF8EB"},
            ].map(item=>(
              <button key={item.key} onClick={()=>item.key==="ai"?setMode("ai"):goTo(1)} style={{
                background:C.white,borderRadius:16,padding:"28px 20px",textAlign:"left",cursor:"pointer",
                boxShadow:"0 1px 10px rgba(0,0,0,0.05)",border:"none",width:"100%",
                display:"flex",gap:16,alignItems:"center",
              }}>
                <div style={{fontSize:36,flexShrink:0}}>{item.icon}</div>
                <div>
                  <h3 style={{fontSize:16,fontWeight:700,marginBottom:4,color:C.dark}}>{item.title}</h3>
                  <p style={{fontSize:12,color:C.textMuted,lineHeight:1.6,marginBottom:8}}>{item.desc}</p>
                  <Badge color={item.bc} bg={item.bb}>{item.badge}</Badge>
                </div>
              </button>
            ))}
          </div>
        )}

        {mode==="ai"&&!showResult&&!analyzing&&(
          <div style={{background:C.white,borderRadius:16,padding:"28px 20px",boxShadow:"0 1px 10px rgba(0,0,0,0.05)"}}>
            {/* Progress */}
            <div style={{display:"flex",gap:3,marginBottom:16}}>
              {AI_QUESTIONS.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?C.primary:"#e4e4e4",transition:"background 0.3s"}}/>)}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <Badge>{q.category}</Badge>
              <span style={{fontSize:11,color:C.textMuted}}>{step+1}/{AI_QUESTIONS.length}</span>
            </div>
            <h3 style={{fontSize:17,fontWeight:700,color:C.dark,margin:"8px 0 4px",lineHeight:1.5}}>{q.q}</h3>
            <p style={{fontSize:11,color:C.textMuted,margin:"0 0 20px"}}>{q.note}</p>

            {q.type==="single"&&(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {q.options.map(opt=>(
                  <button key={opt} onClick={()=>handleSingle(q.key,opt)} style={{
                    background:answers[q.key]===opt?C.primary:C.bg,color:answers[q.key]===opt?"#fff":C.text,
                    border:answers[q.key]===opt?`2px solid ${C.primary}`:`2px solid ${C.border}`,
                    padding:"14px 16px",borderRadius:10,fontSize:14,cursor:"pointer",textAlign:"left",
                  }}>{opt}</button>
                ))}
              </div>
            )}

            {q.type==="multi"&&(
              <div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {q.options.map(opt=>{
                    const sel=(answers[q.key]||[]).includes(opt);
                    const atMax=q.maxSelect&&(answers[q.key]||[]).length>=q.maxSelect&&!sel;
                    return <button key={opt} onClick={()=>handleMulti(q.key,opt,q.maxSelect)} style={{
                      background:sel?C.primary:C.bg,color:sel?"#fff":atMax?C.textMuted:C.text,
                      border:sel?`2px solid ${C.primary}`:`2px solid ${C.border}`,
                      padding:"14px 16px",borderRadius:10,fontSize:14,cursor:atMax?"not-allowed":"pointer",textAlign:"left",opacity:atMax?0.5:1,
                    }}><span style={{marginRight:6}}>{sel?"☑":"☐"}</span>{opt}</button>;
                  })}
                </div>
                {q.maxSelect&&<p style={{fontSize:11,color:C.textMuted,marginTop:6}}>※ 最大{q.maxSelect}つまで</p>}
                <button onClick={goNext} disabled={!canProceed()} style={{marginTop:18,background:canProceed()?C.primary:"#ccc",color:"#fff",border:"none",padding:"16px",borderRadius:10,fontSize:15,fontWeight:700,cursor:canProceed()?"pointer":"not-allowed",width:"100%"}}>次へ</button>
              </div>
            )}

            {q.type==="dual_select"&&(
              <div>
                {q.selects.map(sel=>(
                  <div key={sel.key} style={{marginBottom:18}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.dark,marginBottom:8}}>{sel.label}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {sel.options.map(opt=>{
                        const active=(answers[q.key]||{})[sel.key]===opt;
                        return <button key={opt} onClick={()=>handleDual(sel.key,opt)} style={{
                          background:active?C.primary:C.bg,color:active?"#fff":C.text,
                          border:active?`2px solid ${C.primary}`:`2px solid ${C.border}`,
                          padding:"10px 14px",borderRadius:8,fontSize:13,cursor:"pointer",
                        }}>{opt}</button>;
                      })}
                    </div>
                  </div>
                ))}
                <button onClick={goNext} disabled={!canProceed()} style={{marginTop:6,background:canProceed()?C.primary:"#ccc",color:"#fff",border:"none",padding:"16px",borderRadius:10,fontSize:15,fontWeight:700,cursor:canProceed()?"pointer":"not-allowed",width:"100%"}}>次へ</button>
              </div>
            )}

            <button onClick={()=>{if(step>0)setStep(step-1);else setMode(null);}} style={{marginTop:14,background:"none",border:"none",color:C.textMuted,fontSize:13,cursor:"pointer",padding:"8px 0"}}>← 戻る</button>
          </div>
        )}

        {analyzing&&(
          <div style={{background:C.white,borderRadius:16,padding:"60px 20px",boxShadow:"0 1px 10px rgba(0,0,0,0.05)",textAlign:"center"}}>
            <div style={{width:52,height:52,borderRadius:"50%",border:`3px solid ${C.border}`,borderTopColor:C.primary,margin:"0 auto 20px",animation:"spin 1s linear infinite"}}/>
            <h3 style={{fontSize:16,fontWeight:700,color:C.dark,marginBottom:8}}>AIが分析中...</h3>
            <p style={{fontSize:13,color:C.textMuted,lineHeight:1.8}}>歩行特性・身体機能・使用環境を<br/>総合的に評価しています</p>
          </div>
        )}

        {showResult&&(
          <div>
            <div style={{background:C.white,borderRadius:16,padding:"28px 20px",boxShadow:"0 1px 10px rgba(0,0,0,0.05)",textAlign:"center",marginBottom:16}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:C.primaryBg,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px",fontSize:24}}>✓</div>
              <h3 style={{fontFamily:"'Noto Serif JP',serif",fontSize:19,fontWeight:700,marginBottom:4,color:C.dark}}>おすすめの3本</h3>
              <p style={{fontSize:11,color:C.textMuted}}>理学療法士監修AIが選定しました</p>
            </div>

            {resultCanes.map((cane,i)=>(
              <div key={cane.id} style={{background:C.white,borderRadius:14,padding:"18px 16px",boxShadow:"0 1px 8px rgba(0,0,0,0.05)",marginBottom:12}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:36,height:36,borderRadius:10,background:C.primaryBg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:C.primary,fontSize:16,flexShrink:0}}>{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:3}}>
                      <span style={{fontSize:10,color:C.textMuted}}>{cane.maker}</span>
                      <Badge color={cane.type==="multi"?"#2B6CB0":C.accent} bg={cane.type==="multi"?"#EBF4FF":"#FFF8EB"}>{cane.type==="multi"?"多点杖":"1点杖"}</Badge>
                      {cane.insurance&&<Badge>介護保険</Badge>}
                    </div>
                    <div style={{fontSize:16,fontWeight:700,color:C.dark}}>{cane.name}</div>
                    <div style={{fontSize:18,fontWeight:800,color:C.primary,margin:"4px 0"}}>¥{cane.price.toLocaleString()}<span style={{fontSize:10,fontWeight:400,color:C.textMuted}}> 税込</span></div>
                  </div>
                </div>
                <div style={{marginTop:8,padding:"10px 12px",background:C.bg,borderRadius:8,fontSize:12,color:C.textLight,lineHeight:1.7}}>
                  <strong style={{color:C.primary}}>選定理由：</strong>{reasons[i]}
                </div>
              </div>
            ))}

            <button style={{marginTop:8,background:C.primary,color:"#fff",border:"none",padding:"18px",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",width:"100%"}}>この3本を試す（初回送料無料）</button>
            <p style={{textAlign:"center",fontSize:11,color:C.textMuted,marginTop:8}}>お届けまで3〜5営業日 ─ お試し期間は1週間</p>
            <div style={{marginTop:16,display:"flex",gap:8}}>
              <button onClick={()=>{setShowResult(false);setAnalyzing(false);setStep(0);setAnswers({});setMode(null);}} style={{flex:1,background:"none",border:`1.5px solid ${C.border}`,padding:"12px",borderRadius:8,fontSize:12,color:C.textLight,cursor:"pointer"}}>やり直す</button>
              <button onClick={()=>goTo(1)} style={{flex:1,background:"none",border:`1.5px solid ${C.border}`,padding:"12px",borderRadius:8,fontSize:12,color:C.textLight,cursor:"pointer"}}>商品一覧</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
